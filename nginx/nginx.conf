events {
    worker_connections 2048;
    use epoll;
}

http {
    # ── Upstream pool — all middleware replicas ──────────────────────────────
    # Docker Compose service discovery resolves "middleware" to all replica IPs.
    # least_conn distributes requests to the least-busy worker, which is optimal
    # for long-running LLM verification requests (they are not equal-cost).
    upstream hallucheck_backend {
        least_conn;
        server middleware:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Rate limiting (nginx-level, before reaching FastAPI) ─────────────────
    # 10 req/s burst = 600 req/min; fine-grained limits enforced in FastAPI+Redis
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/event-stream;
    gzip_min_length 1024;

    # ── HTTP server — serves app directly so dev tools work without SSL ────────
    server {
        listen 80;

        location ~ ^/verify/stream {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://hallucheck_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
            add_header X-Accel-Buffering no;
        }

        location / {
            limit_req zone=api burst=40 nodelay;
            proxy_pass         http://hallucheck_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
        }
    }

    # ── HTTPS disabled for local dev — uncomment and add certs for production ───
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ...
    # }
}
