# Hallucination Detection Evaluation Suite v2
# 50 labeled cases across 5 domains: Medical, Legal, Science, Financial, Geography/Tech
# Run: python evaluate.py --cases eval_cases.yaml --verbose
#
# expected_hallucinations: substrings of claims that ARE hallucinations
# expected_actions: acceptable pipeline actions (pass, annotate, flag, block)

cases:

  # ══════════════════════════════════════════════════════════════
  # MEDICAL (14 cases)
